<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>長照系統（簡易版）</title>
</head>
<body>

<h2>新增住民</h2>

姓名：<input id="name"><br><br>
年齡：<input id="age" type="number"><br><br>
狀態：<input id="status"><br><br>

<button onclick="addData()">新增</button>

<hr>

<h2>住民資料</h2>
<div id="list">載入中...</div>

<script>
const apiUrl = "https://script.google.com/macros/s/AKfycbxR-StKmBktHQAgooZ7dIxWlbVOs4Aw0cPe-71h61xSc7kieA5k77IouHxfRYk51EcxFQ/exec";

async function loadData() {
  const res = await fetch(apiUrl);
  const data = await res.json();

  let html = "<table border='1' cellpadding='10'>";
  html += "<tr><th>姓名</th><th>年齡</th><th>狀態</th></tr>";

  data.forEach(item => {
    html += `
      <tr>
        <td>${item.姓名}</td>
        <td>${item.年齡}</td>
        <td>${item.狀態}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("list").innerHTML = html;
}

async function addData() {
  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const status = document.getElementById("status").value;

  await fetch(apiUrl, {
    method: "POST",
    body: JSON.stringify({
      姓名: name,
      年齡: age,
      狀態: status
    })
  });

  alert("新增成功！");
  loadData();
}

loadData();
</script>

</body>
</html>
