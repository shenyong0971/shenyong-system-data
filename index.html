<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>長照資料測試</title>
</head>
<body>

<h2>住民資料</h2>
<div id="output">讀取中...</div>

<script>
const apiUrl = "👉貼你的Apps Script網址";

fetch(apiUrl)
  .then(res => res.json())
  .then(data => {
    let html = "<table border='1' cellpadding='10'>";
    html += "<tr><th>姓名</th><th>年齡</th><th>狀態</th></tr>";

    data.forEach(item => {
      html += `
        <tr>
          <td>${item.姓名}</td>
          <td>${item.年齡}</td>
          <td>${item.狀態}</td>
        </tr>
      `;
    });

    html += "</table>";
    document.getElementById("output").innerHTML = html;
  })
  .catch(err => {
    document.getElementById("output").innerText = "錯誤：" + err;
  });
</script>

</body>
</html>
